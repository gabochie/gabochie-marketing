# Site settings
title: "Gabochie Marketing"
description: "Turn Google Maps into a predictable customer acquisition channel for Ghanaian businesses."
url: "https://marketing.gabochie.com"
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Collections
collections:
  posts:
    output: true
    permalink: /blog/:title/

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/

# Include files
include:
  - _pages
